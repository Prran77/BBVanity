<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <defs>
    <radialGradient id="atomGrad" cx="50%" cy="50%" r="50%">
      <stop offset="0%" style="stop-color:#e74c3c;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#c0392b;stop-opacity:1" />
    </radialGradient>
  </defs>
  
  <!-- Nucleus -->
  <circle cx="50" cy="50" r="8" fill="url(#atomGrad)" />
  
  <!-- Electron paths -->
  <ellipse cx="50" cy="50" rx="35" ry="15" fill="none" stroke="#3498db" stroke-width="2" opacity="0.8" />
  <ellipse cx="50" cy="50" rx="35" ry="15" fill="none" stroke="#3498db" stroke-width="2" opacity="0.8" transform="rotate(60 50 50)" />
  <ellipse cx="50" cy="50" rx="35" ry="15" fill="none" stroke="#3498db" stroke-width="2" opacity="0.8" transform="rotate(120 50 50)" />
  
  <!-- Electrons -->
  <circle cx="85" cy="50" r="4" fill="#f39c12" />
  <circle cx="35" cy="63" r="4" fill="#f39c12" />
  <circle cx="65" cy="37" r="4" fill="#f39c12" />
</svg>
